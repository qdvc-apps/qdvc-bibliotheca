<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b5b92"/>
      <stop offset="1" stop-color="#26436e"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5a86c9"/>
      <stop offset="1" stop-color="#3b5b92"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="40" fill="#eef2f8"/>
  <!-- three stacked books -->
  <g transform="translate(40,44)">
    <rect x="0"   y="120" width="176" height="40" rx="6" fill="url(#cover)"/>
    <rect x="10"  y="124" width="8" height="32" fill="#ffffff" opacity="0.5"/>
    <rect x="12"  y="66"  width="176" height="40" rx="6" fill="#7aa0d4"/>
    <rect x="22"  y="70"  width="8" height="32" fill="#ffffff" opacity="0.5"/>
    <rect x="4"   y="8"   width="150" height="48" rx="6" fill="url(#spine)" transform="rotate(-8 79 32)"/>
    <rect x="20"  y="14"  width="8" height="38" fill="#ffffff" opacity="0.55" transform="rotate(-8 79 32)"/>
  </g>
  <!-- bookmark -->
  <path d="M150 40 h26 v70 l-13 -12 -13 12 z" fill="#e0603a"/>
</svg>
